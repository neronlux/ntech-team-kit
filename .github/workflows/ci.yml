name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type (only used for manual trigger)"
        required: false
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - run: bun run typecheck

      - run: bun run build:plugin

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - run: go build -o /dev/null ./cmd/ntech-team-kit

      - run: go vet ./...

      - run: go test ./...

  release-needed:
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && !contains(github.event.head_commit.message, 'chore(release)')
    outputs:
      should_release: ${{ steps.check.outputs.has_commits }}
      commit_count: ${{ steps.check.outputs.commits }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for unreleased commits
        id: check
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          COMMITS=$(git rev-list "${LATEST_TAG}..HEAD" --count)
          echo "commits=${COMMITS}" >> $GITHUB_OUTPUT
          if [ "$COMMITS" -gt 0 ]; then
            echo "has_commits=true" >> $GITHUB_OUTPUT
            echo "Found ${COMMITS} unreleased commits since ${LATEST_TAG}"
          else
            echo "has_commits=false" >> $GITHUB_OUTPUT
            echo "No unreleased commits since ${LATEST_TAG}"
          fi

  auto-release:
    runs-on: ubuntu-latest
    needs: release-needed
    if: always() && (needs.release-needed.outputs.should_release == 'true' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version
        id: version
        run: |
          CURRENT=$(cat VERSION)
          BUMP="${{ github.event.inputs.bump || 'patch' }}"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "$BUMP" in
            major) NEW_VERSION="$((MAJOR + 1)).0.0" ;;
            minor) NEW_VERSION="${MAJOR}.$((MINOR + 1)).0" ;;
            patch) NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
            *)     NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
          esac

          echo "$NEW_VERSION" > VERSION
          TAG="v${NEW_VERSION}"
          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Bumping ${CURRENT} -> ${NEW_VERSION} (${TAG})"

      - name: Commit version bump and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore(release): bump version to ${{ steps.version.outputs.tag }}"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin HEAD:main
          git push origin "${{ steps.version.outputs.tag }}"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build release binary for verification
        run: |
          VERSION=${{ steps.version.outputs.version }}
          LDFLAGS="-s -w -X main.version=${VERSION}"
          go build -ldflags "$LDFLAGS" -o /dev/null ./cmd/ntech-team-kit

      - name: Compute tarball SHA256
        id: sha
        run: |
          TAG=${{ steps.version.outputs.tag }}
          TARBALL_URL="https://github.com/neronlux/ntech-team-kit/archive/refs/tags/${TAG}.tar.gz"
          curl -sL "$TARBALL_URL" -o /tmp/ntech-team-kit.tar.gz
          SHA256=$(shasum -a 256 /tmp/ntech-team-kit.tar.gz | cut -d' ' -f1)
          echo "sha256=${SHA256}" >> $GITHUB_OUTPUT
          echo "tarball_url=${TARBALL_URL}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Installation

            ### Homebrew (recommended)

            ```bash
            brew tap neronlux/tap
            brew install ntech-team-kit
            ntech-team-kit install
            ```

            ### From source

            ```bash
            git clone https://github.com/neronlux/ntech-team-kit.git
            cd ntech-team-kit
            ./bin/ntech-team-kit install
            ```

            SHA256 of source tarball: `${{ steps.sha.outputs.sha256 }}`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          TAG=${{ steps.version.outputs.tag }}
          SHA256=${{ steps.sha.outputs.sha256 }}
          TARBALL_URL=${{ steps.sha.outputs.tarball_url }}

          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::TAP_TOKEN secret not set — tap will NOT be auto-updated."
            echo "To enable, create a fine-grained PAT with Contents:write on neronlux/homebrew-tap"
            echo "and add it as TAP_TOKEN in Settings > Secrets > Actions."
            echo ""
            echo "Manual: update Formula/ntech-team-kit.rb in neronlux/homebrew-tap"
            echo "  sha256: ${SHA256}"
            echo "  url:    ${TARBALL_URL}"
            exit 0
          fi

          echo "Dispatching update-formula event to neronlux/homebrew-tap..."
          gh api repos/neronlux/homebrew-tap/dispatches \
            -f event_type=update-formula \
            -f "client_payload[tag]=${TAG}" \
            -f "client_payload[sha256]=${SHA256}" \
            -f "client_payload[tarball_url]=${TARBALL_URL}"
          echo "Dispatch sent! The tap repo will update its formula and run tests."

      - name: Update reference formula in this repo
        run: |
          TAG=${{ steps.version.outputs.tag }}
          SHA256=${{ steps.sha.outputs.sha256 }}
          TARBALL_URL=${{ steps.sha.outputs.tarball_url }}

          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|g" Formula/ntech-team-kit.rb
          sed -i "s|url \".*ntech-team-kit/archive/refs/tags/.*\"|url \"${TARBALL_URL}\"|g" Formula/ntech-team-kit.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ntech-team-kit.rb
          git commit -m "chore(release): update formula SHA256 for ${TAG}" || echo "No formula changes"
          git push origin HEAD:main
